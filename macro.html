<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excel System Processor (High Capacity)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f2f5; }
        .card { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; text-align: center; }
        .file-box { border: 2px dashed #007bff; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { background: #28a745; color: white; border: none; padding: 14px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        #status { margin-top: 20px; padding: 12px; border-radius: 4px; display: none; font-size: 14px; white-space: pre-wrap; }
        .err { background: #fce8e6; color: #d93025; display: block !important; }
        .ok { background: #e6f4ea; color: #137333; display: block !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>High-Capacity Processor</h2>
    <p>Optimized for large files (Sheet2 to Sheet1)</p>
    <div class="file-box">
        <input type="file" id="fileInput" accept=".xlsx, .xlsm, .xlsb" />
    </div>
    <button onclick="process()">Process Large File</button>
    <div id="status"></div>
</div>

<script>
async function process() {
    const input = document.getElementById('fileInput');
    const status = document.getElementById('status');
    if (!input.files[0]) return;

    status.innerText = "Initializing... (This may take a moment for large files)";
    status.className = "ok";

    const file = input.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            // 'dense: true' uses a more memory-efficient internal representation
            const wb = XLSX.read(data, { type: 'array', dense: true, cellDates: true });

            const findS = (n) => {
                const name = wb.SheetNames.find(sn => sn.trim().toUpperCase() === n.toUpperCase());
                return name ? wb.Sheets[name] : null;
            };

            const s2 = findS("Sheet2");
            const s1 = findS("Sheet1");

            if (!s2 || !s1) throw new Error("Missing Sheet1 or Sheet2");

            // Convert to JSON sparingly
            const sheet1Rows = XLSX.utils.sheet_to_json(s1, { header: 1 });
            let sheet2Rows = XLSX.utils.sheet_to_json(s2, { header: 1 });

            // Right-to-left deletion indices
            const toDel = [30, 29, 28, 27, 25, 24, 23, 22, 21, 20, 16, 13, 12, 11, 10, 8, 7, 6, 5, 3, 1].sort((a,b)=>b-a);
            
            // Map Sheet1 into a 'Dictionary' for O(1) lookup speed (Massive performance boost)
            const s1Map = new Map();
            sheet1Rows.forEach(row => {
                if (row[0]) s1Map.set(String(row[0]).trim(), row);
            });

            let finalData = [];
            for (let i = 0; i < sheet2Rows.length; i++) {
                let row = sheet2Rows[i];

                if (i < 2) { // Headers
                    toDel.forEach(idx => { if(idx < row.length) row.splice(idx, 1); });
                    finalData.push([null, null, null, ...row]);
                    continue;
                }

                // Process data row
                toDel.forEach(idx => { if(idx < row.length) row.splice(idx, 1); });
                let newRow = [null, null, null, ...row];

                // Text to columns Col E
                if (typeof newRow[4] === 'string') newRow[4] = newRow[4].split(',')[0];
                const keyE = String(newRow[4] || "").trim();
                const keyH = String(newRow[7] || "").trim();

                const matchE = s1Map.get(keyE);
                if (matchE) {
                    newRow[1] = matchE[1]; // B
                    newRow[2] = matchE[2]; // C
                    newRow[9] = matchE[6] || 0; // J
                    newRow[10] = matchE[7] || 0; // K
                }

                const matchH = s1Map.get(keyH);
                if (matchH) newRow[8] = matchH[1]; // I

                newRow[11] = (Number(newRow[9]) || 0) - (Number(newRow[10]) || 0);

                // Filter logic: Keep only if Column L is not blank
                if (newRow[11] !== null && newRow[11] !== undefined && String(newRow[11]).trim() !== "") {
                    finalData.push(newRow);
                }
            }

            const newWs = XLSX.utils.aoa_to_sheet(finalData);
            const newWb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWb, newWs, "Output");
            XLSX.writeFile(newWb, "Processed_Result.xlsx");

            status.innerText = "Success! File Downloaded.";
        } catch (err) {
            status.innerText = "Memory Error: " + err.message + "\nTry a smaller file or close other browser tabs.";
            status.className = "err";
        }
    };

    reader.readAsArrayBuffer(file);
}
</script>
</body>
</html>
