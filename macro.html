<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Data Processor</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f8f9fa; }
        .card { background: white; padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: #202124; margin-bottom: 10px; }
        .instructions { color: #70757a; font-size: 0.9rem; margin-bottom: 25px; }
        .upload-section { border: 2px dashed #4285f4; padding: 30px; border-radius: 10px; background: #f1f3f4; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .upload-section:hover { background: #e8f0fe; }
        button { background-color: #34a853; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.2s; }
        button:hover { background-color: #2d8e47; }
        button:disabled { background-color: #dadce0; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: 500; color: #1967d2; }
    </style>
</head>
<body>

<div class="card">
    <h2>RMS10 Export Formatter</h2>
    <p class="instructions">Upload your file to remove columns and keep all rows (including Row 1).</p>
    
    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
        <span id="fileName">Select Excel File</span>
    </div>
    
    <button id="processBtn" disabled>Generate Cleaned Export</button>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const fileName = document.getElementById('fileName');
    const status = document.getElementById('status');

    // Columns to DELETE: B, D, F, G, H, I, K, L, M, N, Q, U, V, W, X, Y, Z, AB, AC, AD, AE
    const columnsToDelete = [1, 3, 5, 6, 7, 8, 10, 11, 12, 13, 16, 20, 21, 22, 23, 24, 25, 27, 28, 29, 30];

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileName.textContent = e.target.files[0].name;
            processBtn.disabled = false;
        }
    });

    processBtn.addEventListener('click', () => {
        const file = fileInput.files[0];
        const reader = new FileReader();
        status.innerText = "Processing Data...";

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];

                // Convert to 2D Array - header:1 ensures it treats Row 1 as data, not keys
                let rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

                // Process EVERY row found in the file
                const processedRows = rawRows.map(row => {
                    // If a row is empty, return an empty array to maintain structure
                    if (!row) return [];
                    // Filter out the columns by index
                    return row.filter((_, index) => !columnsToDelete.includes(index));
                });

                // Generate new sheet from the array of arrays
                const newWorksheet = XLSX.utils.aoa_to_sheet(processedRows);
                
                // Set column widths for better readability
                newWorksheet['!cols'] = [
                    {wch: 10}, {wch: 12}, {wch: 45}, {wch: 15}, 
                    {wch: 8}, {wch: 10}, {wch: 12}, {wch: 12}, 
                    {wch: 15}, {wch: 10}
                ];

                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "Processed_RMS10");

                // Export
                XLSX.writeFile(newWorkbook, "Formatted_Export.xlsx");
                
                status.innerText = "Success! Row 1 preserved.";
            } catch (err) {
                console.error(err);
                status.innerText = "Error: Check file format.";
            }
        };

        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
