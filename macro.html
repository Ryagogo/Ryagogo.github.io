<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Column Remover</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f0f2f5; color: #333; }
        .card { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        input[type="file"] { display: block; width: 100%; margin: 20px 0; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; cursor: pointer; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: background 0.2s; width: 100%; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.9rem; font-weight: bold; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h2>Excel Processor</h2>
    <p>Upload your file to remove columns B, D, F-I, K-N, Q, U-Z, and AB-AE.</p>
    
    <input type="file" id="excel-file" accept=".xlsx, .xls" />
    <button id="process-btn" disabled>Process & Download</button>
    
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('excel-file');
    const btn = document.getElementById('process-btn');
    const statusDiv = document.getElementById('status');

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) btn.disabled = false;
    });

    btn.addEventListener('click', () => {
        const file = fileInput.files[0];
        const reader = new FileReader();

        statusDiv.innerText = "Processing...";

        reader.onload = (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];

                // Convert worksheet to an array of arrays (easier for index-based deletion)
                // This preserves the exact order of columns by index
                let rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                // Define columns to DELETE (0-indexed)
                // B=1, D=3, F=5, G=6, H=7, I=8, K=10, L=11, M=12, N=13, Q=16, 
                // U=20, V=21, W=22, X=23, Y=24, Z=25, AB=27, AC=28, AD=29, AE=30
                const colsToDelete = [1, 3, 5, 6, 7, 8, 10, 11, 12, 13, 16, 20, 21, 22, 23, 24, 25, 27, 28, 29, 30];

                // Sort descending so that deleting an early index doesn't shift the later ones we need to delete
                const sortedIndices = colsToDelete.sort((a, b) => b - a);

                const processedRows = rows.map(row => {
                    let newRow = [...row];
                    sortedIndices.forEach(index => {
                        if (index < newRow.length) {
                            newRow.splice(index, 1);
                        }
                    });
                    return newRow;
                });

                // Create new workbook
                const newWS = XLSX.utils.aoa_to_sheet(processedRows);
                const newWB = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWB, newWS, "CleanedData");

                // Export
                XLSX.writeFile(newWB, "processed_file.xlsx");
                
                statusDiv.innerHTML = '<span class="success">Successfully processed and downloaded!</span>';
            } catch (error) {
                console.error(error);
                statusDiv.innerText = "Error processing file. Ensure it's a valid Excel format.";
            }
        };

        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
