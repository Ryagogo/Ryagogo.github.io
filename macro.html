<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Remover Tool</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a73e8; margin-top: 0; }
        p { color: #5f6368; font-size: 0.9rem; }
        .upload-area { border: 2px dashed #dadce0; padding: 2rem; border-radius: 8px; margin: 1.5rem 0; cursor: pointer; transition: border 0.3s; }
        .upload-area:hover { border-color: #1a73e8; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { margin-top: 1rem; font-size: 0.85rem; color: #188038; }
    </style>
</head>
<body>

<div class="card">
    <h2>Excel Column Cleaner</h2>
    <p>Upload your file to remove columns B, D, F, G, H, I, K, L, M, N, Q, U, V, W, X, Y, Z, AB, AC, AD, and AE.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none">
        <span id="fileName">Click to select .xlsx file</span>
    </div>
    
    <button id="processBtn" disabled>Process & Download</button>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const fileName = document.getElementById('fileName');
    const status = document.getElementById('status');

    // List of columns to DELETE (converted to 0-based indices)
    // B=1, D=3, F=5, G=6, H=7, I=8, K=10, L=11, M=12, N=13, Q=16, U=20, V=21, W=22, X=23, Y=24, Z=25, AB=27, AC=28, AD=29, AE=30
    const columnsToDelete = [1, 3, 5, 6, 7, 8, 10, 11, 12, 13, 16, 20, 21, 22, 23, 24, 25, 27, 28, 29, 30];

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileName.textContent = e.target.files[0].name;
            processBtn.disabled = false;
        }
    });

    processBtn.addEventListener('click', () => {
        const file = fileInput.files[0];
        const reader = new FileReader();

        status.innerText = "Processing...";

        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];

            // Convert sheet to 2D Array (Rows and Columns)
            let rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

            // Process rows: Filter out the indices in our "delete" list
            const processedRows = rows.map(row => {
                return row.filter((_, index) => !columnsToDelete.includes(index));
            });

            // Create new workbook with the cleaned data
            const newWorksheet = XLSX.utils.aoa_to_sheet(processedRows);
            const newWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "FilteredData");

            // Trigger Download
            XLSX.writeFile(newWorkbook, "Cleaned_File.xlsx");
            
            status.innerText = "Success! File downloaded.";
        };

        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
