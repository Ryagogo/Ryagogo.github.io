<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Excel System Processor (Sheet2 Focus)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f2f5; color: #333; }
        .card { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; text-align: center; }
        .file-box { border: 2px dashed #ccc; padding: 20px; margin: 20px 0; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #0056b3; }
        #status { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; font-size: 14px; }
        .err { background: #f8d7da; color: #721c24; display: block !important; }
        .ok { background: #d4edda; color: #155724; display: block !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>System Processor</h2>
    <p>Processing <b>Sheet2</b> using Lookups from <b>Sheet1</b></p>
    
    <div class="file-box">
        <input type="file" id="fileInput" accept=".xlsx, .xlsm, .xlsb" />
    </div>
    
    <button onclick="process()">Process & Export</button>
    <div id="status"></div>
</div>

<script>
async function process() {
    const input = document.getElementById('fileInput');
    const status = document.getElementById('status');
    
    if (!input.files[0]) {
        status.innerText = "Please select a file.";
        status.className = "err";
        return;
    }

    try {
        status.innerText = "Reading workbook...";
        status.className = "ok";
        
        const data = await input.files[0].arrayBuffer();
        const wb = XLSX.read(data);

        // 1. Identify Sheets (Fuzzy Case-Insensitive)
        const getS = (name) => {
            const found = wb.SheetNames.find(n => n.trim().toUpperCase() === name.toUpperCase());
            return found ? XLSX.utils.sheet_to_json(wb.Sheets[found], { header: 1 }) : null;
        };

        let s2Rows = getS("Sheet2"); // Source Data
        const s1Rows = getS("Sheet1"); // Lookup Table

        if (!s2Rows) throw new Error("Could not find 'Sheet2' in this file.");
        if (!s1Rows) throw new Error("Could not find 'Sheet1' for lookups.");

        // --- STEP A: DELETE COLUMNS (VBA Logic) ---
        // We delete columns from Sheet2 first to clean up the space.
        // B, D, F:G, H:I, K:L, M:N, Q:Q, U:V, W:X, Y:Z, AB:AC, AD:AE
        const toDel = [30, 29, 28, 27, 25, 24, 23, 22, 21, 20, 16, 13, 12, 11, 10, 8, 7, 6, 5, 3, 1].sort((a,b)=>b-a);
        
        let processed = s2Rows.map(row => {
            let r = [...row];
            toDel.forEach(idx => { if(idx < r.length) r.splice(idx, 1); });
            // --- STEP B: INSERT 3 NEW COLUMNS (A, B, C) ---
            return [null, null, null, ...r];
        });

        // --- STEP C: LOGIC & LOOKUPS (Starting Row 3) ---
        for (let i = 2; i < processed.length; i++) {
            let row = processed[i];
            
            // Text to Columns simulation on Column E (Index 4)
            if (row[4] && typeof row[4] === 'string') {
                row[4] = row[4].split(',')[0];
            }

            const eVal = String(row[4] || "").trim(); // Lookup Key from Col E
            const hVal = String(row[7] || "").trim(); // Lookup Key from Col H

            // VLOOKUP Simulation in Sheet1
            const matchE = s1Rows.find(r => String(r[0] || "").trim() === eVal);
            if (matchE) {
                row[1] = matchE[1]; // Col B = Sheet1 Col B
                row[2] = matchE[2]; // Col C = Sheet1 Col C
                row[9] = matchE[6] || 0; // Col J = Sheet1 Col G
                row[10] = matchE[7] || 0; // Col K = Sheet1 Col H
            }

            // VLOOKUP for Sheet2 Col I from Sheet1 (Assuming sheet2 logic in original macro)
            const matchH = s1Rows.find(r => String(r[0] || "").trim() === hVal);
            if (matchH) row[8] = matchH[1];

            // Calculate J - K = L
            row[11] = (Number(row[9]) || 0) - (Number(row[10]) || 0);
        }

        // --- STEP D: FILTER OUT BLANKS IN COL L ---
        processed = processed.filter((row, idx) => {
            if (idx < 2) return true; // Keep headers
            const val = row[11];
            return val !== null && val !== undefined && val !== "";
        });

        // --- STEP E: EXPORT ---
        const newWs = XLSX.utils.aoa_to_sheet(processed);
        const newWb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(newWb, newWs, "Processed_Output");
        XLSX.writeFile(newWb, "System_Processed.xlsx");

        status.innerText = "Success! Downloaded Final File.";
        status.className = "ok";

    } catch (e) {
        status.innerText = "Error: " + e.message;
        status.className = "err";
    }
}
</script>
</body>
</html>
