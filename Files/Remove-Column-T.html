<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Column T Cleaner</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- SheetJS for Excel processing -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">Excel Row Cleaner</h2>
        <p class="text-sm text-gray-500 mb-6 text-center">Upload a file to remove all rows where <strong>Column T</strong> is blank.</p>

        <!-- Upload Zone -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Excel File (.xlsx, .xls)</label>
            <input type="file" id="excelFile" accept=".xlsx, .xls" 
                class="block w-full text-sm text-gray-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-md file:border-0
                file:text-sm file:font-semibold
                file:bg-indigo-50 file:text-indigo-700
                hover:file:bg-indigo-100
                border border-gray-300 rounded-md cursor-pointer focus:outline-none"/>
        </div>

        <!-- Action Button -->
        <button id="processBtn" 
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-md transition duration-200 shadow-sm cursor-pointer disabled:bg-gray-300 disabled:cursor-not-allowed">
            Process & Download
        </button>

        <!-- Status Message -->
        <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('excelFile');
            const statusDiv = document.getElementById('status');
            
            if (!fileInput.files || fileInput.files.length === 0) {
                showStatus('Please select an Excel file first.', 'text-red-600');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            showStatus('Processing...', 'text-indigo-600');

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // Column T is index 19 (A=0, B=1 ... T=19)
                    const targetColumnIndex = 19; 
                    let totalRemoved = 0;

                    // Process each sheet in the workbook
                    workbook.SheetNames.forEach(sheetName => {
                        const worksheet = workbook.Sheets[sheetName];
                        
                        // Convert sheet to an array of arrays (including raw/empty cells)
                        const jsonSheet = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: null });
                        
                        if (jsonSheet.length === 0) return;

                        // Keep the header row automatically (index 0)
                        const headerRow = jsonSheet[0];
                        
                        // Filter the remaining rows
                        const filteredRows = jsonSheet.slice(1).filter(row => {
                            const cellValue = row[targetColumnIndex];
                            
                            // Check if cell is null, undefined, or just empty spaces
                            const isBlank = cellValue === null || cellValue === undefined || String(cellValue).trim() === '';
                            
                            if (isBlank) {
                                totalRemoved++;
                                return false; // Delete row
                            }
                            return true; // Keep row
                        });

                        // Reassemble sheet with headers + filtered rows
                        const newSheetData = [headerRow, ...filteredRows];
                        
                        // Replace the old sheet data with the cleaned data
                        workbook.Sheets[sheetName] = XLSX.utils.aoa_to_sheet(newSheetData);
                    });

                    // Trigger the download
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.'));
                    const extension = file.name.substring(file.name.lastIndexOf('.'));
                    const newFileName = `${originalName}_cleaned${extension}`;

                    XLSX.writeFile(workbook, newFileName);
                    showStatus(`Success! Removed ${totalRemoved} rows. File downloaded.`, 'text-green-600');

                } catch (error) {
                    console.error(error);
                    showStatus('Error processing file. Ensure it is a valid Excel document.', 'text-red-600');
                }
            };

            reader.readAsArrayBuffer(file);
        });

        function showStatus(message, colorClass) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `mt-4 text-center text-sm font-medium ${colorClass}`;
            statusDiv.innerText = message;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
